<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>María Romo - Diseñadora Interactiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1A0B2E;        
            --purple-card: #2D124D;    
            --purple-glow: #6E30D1;    
            --accent-yellow: #F3E779;  
            --text-light: #FFFFFF;
            --text-muted: #D1C4E9;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .hero { text-align: center; padding: 60px 20px; }

        /* Solución de imagen: Asegúrate que el src sea el enlace directo de la imagen */
        .hero-img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 3px solid var(--purple-glow);
            object-fit: cover;
        }

        h1 { font-size: 2.5rem; color: var(--accent-yellow); margin: 20px 0; }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columnas */
            gap: 20px;
            margin-top: 40px;
        }

        .service-card {
            background-color: var(--purple-card);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        /* Tipografía Poppins Regular aplicada aquí */
        .service-card p {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            color: var(--text-light);
            font-size: 1rem;
        }

        @media (max-width: 600px) {
            .services-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="https://i.ibb.co/3yBmHwvc/tu-imagen.jpg" alt="María Romo" class="hero-img">
        <h1>Diseño Web Estratégico</h1>
    </header>

    <section class="container">
        <div class="services-grid">
            <div class="service-card"><p>Landing pages de alta conversión.</p></div>
            <div class="service-card"><p>Optimización Google Maps.</p></div>
            <div class="service-card"><p>Enlaces directos a WhatsApp.</p></div>
            <div class="service-card"><p>Mantenimiento web integral.</p></div>
        </div>
    </section>

</body>
</html>
